version: '3.8'

services:
  # -------------------------------------------------------------------
  # FRONEND SERVICE (Vite + React + TS -> Nginx Proxy)
  # -------------------------------------------------------------------
  frontend:
    build:
      context: ../HiveBoard-Frontend
      dockerfile: Dockerfile
    container_name: hiveboard-frontend
    ports:
      - "80:80"    # Maps port 80 of your host (localhost:80) to port 80 of the frontend container
    depends_on:
      - backend
    restart: always

  # -------------------------------------------------------------------
  # BACKEND SERVICE (Node.js + Express + Socket.IO)
  # -------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiveboard-backend
    ports:
      - "5000:5000" # Expose backend port independently (Optional since Nginx proxies /api and /socket.io anyway)
    environment:
      - PORT=5000
      - NODE_ENV=production
    env_file:
      - .env # Loads local keys (e.g., Google OAuth, Gemini, JWT_SECRET)
    depends_on:
      - mongo
    restart: always

  # -------------------------------------------------------------------
  # DATABASE SERVICE (MongoDB)
  # -------------------------------------------------------------------
  mongo:
    image: mongo:latest
    container_name: hiveboard-mongo
    ports:
      - "27017:27017" # Maps localhost:27017 to connect from outside DB GUIs like Compass
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
